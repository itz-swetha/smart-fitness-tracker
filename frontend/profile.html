<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Fitness Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo">
                <h2>FitTrack</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="activities.html" class="nav-link">Activities</a></li>
                <li><a href="exercises.html" class="nav-link">Exercises</a></li>
                <li><a href="workouts.html" class="nav-link">Workout Plans</a></li>
                <li><a href="reports.html" class="nav-link">Reports</a></li>
                <li><a href="profile.html" class="nav-link active">Profile</a></li>
            </ul>
            <div class="user-section">
                <p id="userNameDisplay"></p>
                <button id="logoutBtn" class="btn btn-danger">Logout</button>
            </div>
        </nav>

        <main class="main-content">
            <header class="top-bar">
                <h1>Your Profile</h1>
            </header>

            <div class="content-area">
                <div class="card">
                    <h2>Personal Information</h2>
                    <form id="profileForm">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" id="firstName" required>
                        </div>

                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" id="lastName" required>
                        </div>

                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="email" readonly>
                        </div>

                        <div class="form-group">
                            <label>Age</label>
                            <input type="number" id="age" required>
                        </div>

                        <div class="form-group">
                            <label>Height (cm)</label>
                            <input type="number" id="height" step="0.1" required>
                        </div>

                        <div class="form-group">
                            <label>Weight (kg)</label>
                            <input type="number" id="weight" step="0.1" required>
                        </div>

                        <div class="form-group">
                            <label>Fitness Goal</label>
                            <select id="fitnessGoal" required>
                                <option value="Weight Loss">Weight Loss</option>
                                <option value="Muscle Gain">Muscle Gain</option>
                                <option value="Endurance">Endurance</option>
                                <option value="Flexibility">Flexibility</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary">Update Profile</button>
                    </form>
                </div>

                <!-- Health Metrics -->
                <div class="card">
                    <h2>Health Metrics</h2>
                    <div class="metrics-grid">
                        <div class="metric">
                            <h3>BMI</h3>
                            <p id="bmi" class="metric-value">--</p>
                        </div>
                        <div class="metric">
                            <h3>Status</h3>
                            <p id="bmiStatus" class="metric-status">--</p>
                        </div>
                    </div>
                </div>

                <!-- Account Settings -->
                <div class="card">
                    <h2>Account Settings</h2>
                    <button id="deleteAccountBtn" class="btn btn-danger">Delete Account</button>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        const userId = localStorage.getItem('userId');

        if (!userId) {
            window.location.href = 'index.html';
        }

        document.getElementById('userNameDisplay').textContent = localStorage.getItem('userName');

        async function loadProfile() {
            try {
                const response = await fetch(`http://localhost:8080/api/users/${userId}`);
                const user = await response.json();

                document.getElementById('firstName').value = user.firstName;
                document.getElementById('lastName').value = user.lastName;
                document.getElementById('email').value = user.email;
                document.getElementById('age').value = user.age;
                document.getElementById('height').value = user.height;
                document.getElementById('weight').value = user.weight;
                document.getElementById('fitnessGoal').value = user.fitnessGoal;

                updateBMI(user.height, user.weight);
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }

        function updateBMI(height, weight) {
            const bmi = (weight / ((height / 100) * (height / 100))).toFixed(1);
            document.getElementById('bmi').textContent = bmi;

            let status = '';
            if (bmi < 18.5) status = 'Underweight';
            else if (bmi < 25) status = 'Normal Weight';
            else if (bmi < 30) status = 'Overweight';
            else status = 'Obese';

            document.getElementById('bmiStatus').textContent = status;
        }

        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const user = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                age: parseInt(document.getElementById('age').value),
                height: parseFloat(document.getElementById('height').value),
                weight: parseFloat(document.getElementById('weight').value),
                fitnessGoal: document.getElementById('fitnessGoal').value
            };

            try {
                const response = await fetch(`http://localhost:8080/api/users/${userId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(user)
                });

                if (response.ok) {
                    alert('Profile updated successfully!');
                    loadProfile();
                } else {
                    alert('Failed to update profile');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error updating profile');
            }
        });

        document.getElementById('deleteAccountBtn').addEventListener('click', function() {
            if (confirm('Are you sure you want to delete your account? This action cannot be undone.')) {
                fetch(`http://localhost:8080/api/users/${userId}`, { method: 'DELETE' })
                    .then(() => {
                        alert('Account deleted successfully');
                        localStorage.removeItem('userId');
                        localStorage.removeItem('userName');
                        window.location.href = 'index.html';
                    })
                    .catch(err => console.error('Error:', err));
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.removeItem('userId');
            localStorage.removeItem('userName');
            window.location.href = 'index.html';
        });

        loadProfile();
    </script>
</body>
</html>
