<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker - Login & Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Fitness Tracker</h1>
            <p class="tagline">Track Your Fitness Journey</p>

            <!-- Login Tab -->
            <div class="auth-tabs">
                <button class="tab-button active" id="loginTab">Login</button>
                <button class="tab-button" id="registerTab">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit" class="btn btn-primary">Login</button>
                <p id="loginError" class="error-message"></p>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form">
                <input type="text" id="regFirstName" placeholder="First Name" required>
                <input type="text" id="regLastName" placeholder="Last Name" required>
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="text" id="regUsername" placeholder="Username" required>
                <input type="password" id="regPassword" placeholder="Password" required>
                <input type="number" id="regAge" placeholder="Age" required>
                <input type="number" id="regHeight" placeholder="Height (cm)" required>
                <input type="number" id="regWeight" placeholder="Weight (kg)" required>
                <select id="regFitnessGoal" required>
                    <option value="">Select Fitness Goal</option>
                    <option value="Weight Loss">Weight Loss</option>
                    <option value="Muscle Gain">Muscle Gain</option>
                    <option value="Endurance">Endurance</option>
                    <option value="Flexibility">Flexibility</option>
                </select>
                <button type="submit" class="btn btn-primary">Register</button>
                <p id="registerError" class="error-message"></p>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Initialize auth page
        if (window.location.pathname.endsWith('index.html') || window.location.pathname.endsWith('/')) {
            document.getElementById('loginTab').addEventListener('click', function() {
                document.querySelector('#loginForm').classList.add('active');
                document.querySelector('#registerForm').classList.remove('active');
                document.getElementById('loginTab').classList.add('active');
                document.getElementById('registerTab').classList.remove('active');
            });

            document.getElementById('registerTab').addEventListener('click', function() {
                document.querySelector('#registerForm').classList.add('active');
                document.querySelector('#loginForm').classList.remove('active');
                document.getElementById('registerTab').classList.add('active');
                document.getElementById('loginTab').classList.remove('active');
            });

            document.getElementById('loginForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                
                try {
                    const response = await fetch('http://localhost:8080/api/users/email/' + email);
                    if (response.ok) {
                        const user = await response.json();
                        localStorage.setItem('userId', user.id);
                        localStorage.setItem('userName', user.firstName + ' ' + user.lastName);
                        window.location.href = 'dashboard.html';
                    } else {
                        document.getElementById('loginError').textContent = 'Invalid email or password';
                    }
                } catch (error) {
                    document.getElementById('loginError').textContent = 'Login failed. Please try again.';
                }
            });

            document.getElementById('registerForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const user = {
                    firstName: document.getElementById('regFirstName').value,
                    lastName: document.getElementById('regLastName').value,
                    email: document.getElementById('regEmail').value,
                    username: document.getElementById('regUsername').value,
                    password: document.getElementById('regPassword').value,
                    age: parseInt(document.getElementById('regAge').value),
                    height: parseFloat(document.getElementById('regHeight').value),
                    weight: parseFloat(document.getElementById('regWeight').value),
                    fitnessGoal: document.getElementById('regFitnessGoal').value
                };

                try {
                    const response = await fetch('http://localhost:8080/api/users/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(user)
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        localStorage.setItem('userId', data.user.id);
                        localStorage.setItem('userName', data.user.firstName + ' ' + data.user.lastName);
                        window.location.href = 'dashboard.html';
                    } else {
                        const error = await response.json();
                        document.getElementById('registerError').textContent = error.error;
                    }
                } catch (error) {
                    document.getElementById('registerError').textContent = 'Registration failed. Please try again.';
                }
            });
        }
    </script>
</body>
</html>
