<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activities - Fitness Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo">
                <h2>FitTrack</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="activities.html" class="nav-link active">Activities</a></li>
                <li><a href="exercises.html" class="nav-link">Exercises</a></li>
                <li><a href="workouts.html" class="nav-link">Workout Plans</a></li>
                <li><a href="reports.html" class="nav-link">Reports</a></li>
                <li><a href="profile.html" class="nav-link">Profile</a></li>
            </ul>
            <div class="user-section">
                <p id="userNameDisplay"></p>
                <button id="logoutBtn" class="btn btn-danger">Logout</button>
            </div>
        </nav>

        <main class="main-content">
            <header class="top-bar">
                <h1>Track Your Activities</h1>
            </header>

            <div class="content-area">
                <!-- Add Activity Form -->
                <div class="card">
                    <h2>Log New Activity</h2>
                    <form id="activityForm">
                        <div class="form-group">
                            <label>Activity Type</label>
                            <select id="activityType" required>
                                <option value="">Select Type</option>
                                <option value="Running">Running</option>
                                <option value="Swimming">Swimming</option>
                                <option value="Yoga">Yoga</option>
                                <option value="Cycling">Cycling</option>
                                <option value="Walking">Walking</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Duration (minutes)</label>
                            <input type="number" id="duration" placeholder="Enter duration" required>
                        </div>

                        <div class="form-group">
                            <label>Distance (km)</label>
                            <input type="number" id="distance" placeholder="Enter distance" step="0.1">
                        </div>

                        <div class="form-group">
                            <label>Date</label>
                            <input type="datetime-local" id="activityDate" required>
                        </div>

                        <div class="form-group">
                            <label>Notes</label>
                            <textarea id="notes" placeholder="Add any notes"></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary">Log Activity</button>
                    </form>
                </div>

                <!-- Filter Activities -->
                <div class="card">
                    <h2>Your Activities</h2>
                    <div class="filter-section">
                        <select id="filterType">
                            <option value="">All Activities</option>
                            <option value="Running">Running</option>
                            <option value="Swimming">Swimming</option>
                            <option value="Yoga">Yoga</option>
                        </select>
                    </div>

                    <div id="activitiesList" class="activities-table">
                        <p>Loading activities...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        const userId = localStorage.getItem('userId');

        if (!userId) {
            window.location.href = 'index.html';
        }

        document.getElementById('activityDate').valueAsDate = new Date();
        document.getElementById('userNameDisplay').textContent = localStorage.getItem('userName');

        async function loadActivities(type = '') {
            try {
                let url = `http://localhost:8080/api/activities/user/${userId}`;
                if (type) {
                    url = `http://localhost:8080/api/activities/user/${userId}/type/${type}`;
                }

                const response = await fetch(url);
                const activities = await response.json();

                const activitiesDiv = document.getElementById('activitiesList');
                if (!activities || activities.length === 0) {
                    activitiesDiv.innerHTML = '<p>No activities found</p>';
                    return;
                }

                let html = '<table class="activities-table"><thead><tr><th>Type</th><th>Date</th><th>Duration</th><th>Distance</th><th>Calories</th><th>Action</th></tr></thead><tbody>';
                
                activities.forEach(activity => {
                    const date = new Date(activity.activityDate);
                    html += `
                        <tr>
                            <td>${activity.activityType}</td>
                            <td>${date.toLocaleDateString()} ${date.toLocaleTimeString()}</td>
                            <td>${activity.duration} min</td>
                            <td>${activity.distance.toFixed(2)} km</td>
                            <td>${activity.caloriesBurned.toFixed(0)} kcal</td>
                            <td>
                                <button class="btn btn-small btn-danger" onclick="deleteActivity('${activity.id}')">Delete</button>
                            </td>
                        </tr>
                    `;
                });

                html += '</tbody></table>';
                activitiesDiv.innerHTML = html;
            } catch (error) {
                console.error('Error loading activities:', error);
            }
        }

        document.getElementById('activityForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const activity = {
                userId: userId,
                activityType: document.getElementById('activityType').value,
                duration: parseFloat(document.getElementById('duration').value),
                distance: parseFloat(document.getElementById('distance').value) || 0,
                activityDate: new Date(document.getElementById('activityDate').value).toISOString(),
                notes: document.getElementById('notes').value,
                caloriesBurned: 0
            };

            try {
                const response = await fetch('http://localhost:8080/api/activities', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(activity)
                });

                if (response.ok) {
                    alert('Activity logged successfully!');
                    document.getElementById('activityForm').reset();
                    document.getElementById('activityDate').valueAsDate = new Date();
                    loadActivities();
                } else {
                    alert('Failed to log activity');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error logging activity');
            }
        });

        document.getElementById('filterType').addEventListener('change', function() {
            loadActivities(this.value);
        });

        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.removeItem('userId');
            localStorage.removeItem('userName');
            window.location.href = 'index.html';
        });

        function deleteActivity(id) {
            if (confirm('Are you sure you want to delete this activity?')) {
                fetch(`http://localhost:8080/api/activities/${id}`, { method: 'DELETE' })
                    .then(() => loadActivities())
                    .catch(err => console.error('Error:', err));
            }
        }

        loadActivities();
    </script>
</body>
</html>
